name: Terragrunt CI/CD Pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            # Install Terragrunt  
            - name: Set up Terragrunt
              uses: gruntwork-io/terragrunt-action@v3
              with:
                tg_version: 0.99.4

            # Configure AWS credentials    
            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v2
              with:
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                aws-region: eu-west-1

            # Run Terragrunt FMT to fix any formatting issues    
            - name: Terragrunt FMT
              run: terragrunt hcl fmt --check

            # Run Terragrunt Validate to check for any syntax errors  
            - name: Terragrunt Validate
              run: terragrunt validate

            # Run Terragrunt Plan to see the changes that will be applied (only for the affected modules)  
            - name: Terragrunt Plan
              run: terragrunt run-all plan --non-interactive --filter-affected
            
            # Run Terragrunt Apply to deploy the changes in AWS  
            - name: Terragrunt Apply
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              run: terragrunt run-all apply --non-interactive --filter-affected -auto-approve         